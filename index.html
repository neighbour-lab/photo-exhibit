<!DOCTYPE html>
<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="apple-mobile-web-app-capable" content="yes">
    <!-- Latest Stable Libraries -->
    <script src="https://aframe.io"></script>
    <script src="https://jsdelivr.net"></script>
    
    <style>
      #loading-screen {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: #000; color: #fff; display: flex;
        flex-direction: column; align-items: center; justify-content: center;
        z-index: 9999; font-family: sans-serif;
      }
      .hidden { display: none !important; }
      #start-btn { 
        padding: 15px 30px; background: #fff; color: #000; 
        border: none; border-radius: 5px; font-size: 1.1rem; cursor: pointer;
      }
    </style>
  </head>
  <body>
    <!-- Overlay for User Interaction (Required by iOS/Safari) -->
    <div id="loading-screen">
      <div id="loading-text">正在初始化系統... (Loading)</div>
      <button id="start-btn" class="hidden">點擊開始展覽 (Start)</button>
    </div>

    <a-scene 
      mindar-image="imageTargetSrc: ./targets.mind; autoStart: false;" 
      embedded color-space="sRGB" 
      renderer="colorManagement: true, physicallyCorrectLights" 
      vr-mode-ui="enabled: false" 
      device-orientation-permission-ui="enabled: false">
      
      <a-camera position="0 0 0" look-controls="enabled: false" cursor="fuse: false; rayOrigin: mouse;" raycaster="far: 10000; objects: .clickable"></a-camera>

      <!-- Target 0 -->
      
        <a-plane color="#000" opacity="0.7" position="0 0 0" height="0.5" width="1"></a-plane>
        <a-text value="這是第 1 張照片的內容" align="center" color="white" width="2" position="0 0 0.05"></a-text>
      

      <!-- Target 1 -->
      
        <a-plane color="#000" opacity="0.7" position="0 0 0" height="0.5" width="1"></a-plane>
        <a-text value="這是第 2 張照片的內容" align="center" color="white" width="2" position="0 0 0.05"></a-text>
      

      <!-- Target 2 -->
      
        <a-plane color="#000" opacity="0.7" position="0 0 0" height="0.5" width="1"></a-plane>
        <a-text value="這是第 3 張照片的內容" align="center" color="white" width="2" position="0 0 0.05"></a-text>
      
    </a-scene>

    <script>
      const sceneEl = document.querySelector('a-scene');
      const startBtn = document.querySelector('#start-btn');
      const loadingText = document.querySelector('#loading-text');

      // Detect when AR engine is ready
      sceneEl.addEventListener("arReady", () => {
        loadingText.classList.add('hidden');
        startBtn.classList.remove('hidden');
      });

      // User must tap to start (Modern browsers block auto-camera)
      startBtn.addEventListener('click', () => {
        sceneEl.systems["mindar-image-system"].start();
        document.querySelector('#loading-screen').classList.add('hidden');
      });

      // Error handling
      sceneEl.addEventListener("arError", (event) => {
        loadingText.innerHTML = "錯誤: 無法啟動相機<br>Error: Camera Failed";
      });
    </script>
  </body>
</html>
